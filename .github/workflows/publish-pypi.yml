name: Publish Python package to PyPI

# Publishes the `mcpfz-probe` Python monitor package (the RuntimeMonitor + policy
# engine) so it can be installed as a dependency, e.g. `mcp-fuzzer[mcpfz-probe]`.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token secret is stored in the
# repo. One-time setup on PyPI: add a trusted publisher for project
# `mcpfz-probe` pointing at owner `Agent-Hellboy`, repo `mcpfz-probe`, workflow
# `publish-pypi.yml`, environment `pypi`. See
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for trusted publishing

jobs:
  pypi:
    name: build + publish sdist/wheel
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
