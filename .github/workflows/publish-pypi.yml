name: Publish Python package to PyPI

# Publishes the `mcpfz-probe` Python monitor package (the RuntimeMonitor + policy
# engine) so it can be installed as a dependency, e.g. `mcp-fuzzer[mcpfz-probe]`.
# Uses the repo's PYPI_API_TOKEN secret.

on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    name: build + publish sdist/wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
